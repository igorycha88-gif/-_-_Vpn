name: Deploy RU Server

on:
  push:
    branches: [main, dev1]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.opencode/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Ветка для деплоя'
        required: false
        default: 'dev1'
      skip_smoke:
        description: 'Пропустить smoke-тесты'
        type: boolean
        default: false
      force_rollback:
        description: 'Принудительный откат'
        type: boolean
        default: false

concurrency:
  group: deploy-ru
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/smarttraffic
  COMPOSE_FILE: deploy/server-ru/docker-compose.prod.yml
  HEALTH_URL: http://localhost:8080/health
  HEALTH_RETRIES: 15
  HEALTH_INTERVAL: 5
  CANARY_WAIT: 30
  BACKUP_KEEP: 5

jobs:
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to RU Server
    needs: ci
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production-ru' || 'production-ru' }}
    timeout-minutes: 30
    if: github.event.inputs.force_rollback != 'true'
    outputs:
      deploy_tag: ${{ steps.snapshot.outputs.tag }}
      commit_sha: ${{ steps.snapshot.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RU_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.RU_SSH_HOST_KEY }}" > ~/.ssh/known_hosts 2>/dev/null || \
            ssh-keyscan -H "${{ secrets.RU_SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Determine branch
        id: branch
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Deploying branch: $BRANCH"

      - name: Pre-deploy checks
        timeout-minutes: 3
        env:
          RU_HOST: ${{ secrets.RU_SERVER_HOST }}
          RU_USER: ${{ secrets.RU_SERVER_USER }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=15 -o ServerAliveInterval=30 ${RU_USER}@${RU_HOST}"

          echo "=== Pre-flight: проверка подключения ==="
          $SSH "echo SSH_OK"

          echo "=== Pre-flight: свободное место на диске ==="
          FREE_GB=$($SSH "df -BG ${DEPLOY_PATH} | tail -1 | awk '{print \$4}' | tr -d 'G'")
          echo "Свободно: ${FREE_GB} GB"
          if [[ "${FREE_GB}" -lt 2 ]]; then
            echo "ERROR: Мало свободного места (< 2 GB). Деплой отменён."
            exit 1
          fi

          echo "=== Pre-flight: проверка lock-файла ==="
          if $SSH "test -f /tmp/smarttraffic-deploy.lock" 2>/dev/null; then
            LOCK_PID=$($SSH "cat /tmp/smarttraffic-deploy.lock" 2>/dev/null || echo "")
            if [[ -n "${LOCK_PID}" ]] && $SSH "kill -0 ${LOCK_PID}" 2>/dev/null; then
              echo "ERROR: Другой деплой уже выполняется (PID: ${LOCK_PID})"
              exit 1
            fi
            echo "Устаревшая блокировка — будет удалена"
          fi

      - name: Snapshot (backup DB + save current state)
        id: snapshot
        timeout-minutes: 3
        env:
          RU_HOST: ${{ secrets.RU_SERVER_HOST }}
          RU_USER: ${{ secrets.RU_SERVER_USER }}
          RU_PATH: ${{ secrets.RU_SERVER_PATH }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=15 ${RU_USER}@${RU_HOST}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          TAG="deploy_${TIMESTAMP}"

          echo "=== Snapshot: бэкап БД ==="
          $SSH "mkdir -p ${RU_PATH:-$DEPLOY_PATH}/backups ${RU_PATH:-$DEPLOY_PATH}/data"
          $SSH "if [ -f ${RU_PATH:-$DEPLOY_PATH}/data/smarttraffic.db ]; then \
                  cp ${RU_PATH:-$DEPLOY_PATH}/data/smarttraffic.db \
                     ${RU_PATH:-$DEPLOY_PATH}/backups/db_${TIMESTAMP}.sqlite.bak; \
                  echo 'DB backed up'; \
                else echo 'No DB file yet'; fi"

          echo "=== Snapshot: сохранение текущего коммита ==="
          PREV_SHA=$($SSH "cd ${RU_PATH:-$DEPLOY_PATH} && git rev-parse --short HEAD 2>/dev/null || echo unknown")
          $SSH "echo '${PREV_SHA}' > ${RU_PATH:-$DEPLOY_PATH}/.deploy-previous-tag"
          echo "Previous SHA: ${PREV_SHA}"

          echo "=== Snapshot: очистка старых бэкапов ==="
          $SSH "ls -1t ${RU_PATH:-$DEPLOY_PATH}/backups/db_*.sqlite.bak 2>/dev/null | tail -n +\$((${{ env.BACKUP_KEEP }}+1)) | xargs -r rm -f"

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha=${PREV_SHA}" >> $GITHUB_OUTPUT
          echo "::notice::Snapshot: tag=${TAG}, prev_sha=${PREV_SHA}"

      - name: Update code on server
        timeout-minutes: 5
        env:
          RU_HOST: ${{ secrets.RU_SERVER_HOST }}
          RU_USER: ${{ secrets.RU_SERVER_USER }}
          RU_PATH: ${{ secrets.RU_SERVER_PATH }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=15 -o ServerAliveInterval=30 ${RU_USER}@${RU_HOST}"

          echo "=== Обновление кода: ${BRANCH} ==="
          $SSH "cd ${RU_PATH} && git fetch origin ${BRANCH} && git reset --hard origin/${BRANCH}"

          REMOTE_SHA=$($SSH "cd ${RU_PATH} && git rev-parse --short HEAD")
          echo "Remote SHA: ${REMOTE_SHA}"

      - name: Write production .env
        env:
          RU_HOST: ${{ secrets.RU_SERVER_HOST }}
          RU_USER: ${{ secrets.RU_SERVER_USER }}
          RU_PATH: ${{ secrets.RU_SERVER_PATH }}
          PRODUCTION_ENV: ${{ secrets.RU_PRODUCTION_ENV }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=15 ${RU_USER}@${RU_HOST}"
          echo "${PRODUCTION_ENV}" | $SSH "cat > ${RU_PATH}/.env"
          echo "${PRODUCTION_ENV}" | $SSH "cat > ${RU_PATH}/deploy/server-ru/.env"

      - name: Run deploy script
        timeout-minutes: 20
        env:
          RU_HOST: ${{ secrets.RU_SERVER_HOST }}
          RU_USER: ${{ secrets.RU_SERVER_USER }}
          RU_PATH: ${{ secrets.RU_SERVER_PATH }}
          SKIP_SMOKE: ${{ github.event.inputs.skip_smoke }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=15 -o ServerAliveInterval=30 ${RU_USER}@${RU_HOST}"
          $SSH "cd ${RU_PATH} && \
            DEPLOY_PATH=${RU_PATH} \
            SKIP_HEALTH_CHECK=false \
            SKIP_SMOKE=${SKIP_SMOKE:-false} \
            CANARY_WAIT=${{ env.CANARY_WAIT }} \
            bash deploy/server-ru/scripts/remote-deploy-ru.sh"

      - name: Post-deploy verification
        timeout-minutes: 3
        env:
          RU_HOST: ${{ secrets.RU_SERVER_HOST }}
          RU_USER: ${{ secrets.RU_SERVER_USER }}
          RU_PATH: ${{ secrets.RU_SERVER_PATH }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 ${RU_USER}@${RU_HOST}"

          echo "=== Контейнеры ==="
          $SSH "cd ${RU_PATH} && docker compose -f ${{ env.COMPOSE_FILE }} ps \
            --format 'table {{.Name}}\t{{.Status}}\t{{.Ports}}'"

          echo "=== API Health ==="
          HTTP=$($SSH "curl -sf -o /dev/null -w '%{http_code}' ${{ env.HEALTH_URL }} 2>/dev/null || echo 000")
          echo "Health: HTTP ${HTTP}"

          echo "=== Логи (последние 20 строк) ==="
          $SSH "cd ${RU_PATH} && docker compose -f ${{ env.COMPOSE_FILE }} logs --tail=20 2>&1"

      - name: Cleanup SSH key
        if: always()
        run: rm -rf ~/.ssh/deploy_key

  notify:
    name: Deploy Summary
    needs: [deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Result
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "::notice::DEPLOY SUCCESS: ${{ steps.branch.outputs.branch }} → RU server"
          else
            echo "::error::DEPLOY FAILED: RU server — check logs"
          fi
