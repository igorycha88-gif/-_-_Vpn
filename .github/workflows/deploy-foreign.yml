name: Deploy Foreign Server

on:
  workflow_dispatch:
    inputs:
      restart_wireguard:
        description: 'Перезапустить WireGuard'
        type: boolean
        default: true
      verify_tunnel:
        description: 'Проверить тоннель после деплоя'
        type: boolean
        default: true
      deploy_config:
        description: 'Обновить конфиг WireGuard'
        type: boolean
        default: true

concurrency:
  group: deploy-foreign
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Foreign Server
    runs-on: ubuntu-latest
    environment: production-foreign
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.FOREIGN_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.FOREIGN_SSH_HOST_KEY }}" > ~/.ssh/known_hosts 2>/dev/null || \
            ssh-keyscan -H "${{ secrets.FOREIGN_SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pre-flight checks
        timeout-minutes: 2
        env:
          FH: ${{ secrets.FOREIGN_SERVER_HOST }}
          FU: ${{ secrets.FOREIGN_SERVER_USER }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 ${FU}@${FH}"

          echo "=== Проверка подключения ==="
          $SSH "echo SSH_OK"

          echo "=== Проверка WireGuard установлен ==="
          $SSH "which wg-quick || (echo 'WireGuard не установлен!' && exit 1)"

          echo "=== Свободное место ==="
          FREE_GB=$($SSH "df -BG /etc/wireguard | tail -1 | awk '{print \$4}' | tr -d 'G'")
          echo "Свободно: ${FREE_GB} GB"
          if [[ "${FREE_GB}" -lt 1 ]]; then
            echo "ERROR: Мало свободного места на диске"
            exit 1
          fi

      - name: Generate WireGuard config from secrets
        if: github.event.inputs.deploy_config == 'true'
        env:
          WG_PRIVATE_KEY: ${{ secrets.FOREIGN_WG_PRIVATE_KEY }}
          WG_ADDRESS: ${{ secrets.FOREIGN_WG_ADDRESS }}
          WG_LISTEN_PORT: ${{ secrets.FOREIGN_WG_LISTEN_PORT }}
          RU_WG_PUBLIC_KEY: ${{ secrets.RU_WG_PUBLIC_KEY }}
          RU_SERVER_IP: ${{ secrets.RU_SERVER_HOST }}
        run: |
          cat > /tmp/wg0.conf <<EOF
          [Interface]
          PrivateKey = ${WG_PRIVATE_KEY}
          Address = ${WG_ADDRESS}
          ListenPort = ${WG_LISTEN_PORT}

          PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT; iptables -t nat -A POSTROUTING -s 10.20.0.0/30 -o eth0 -j MASQUERADE
          PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -D FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT; iptables -t nat -D POSTROUTING -s 10.20.0.0/30 -o eth0 -j MASQUERADE

          [Peer]
          PublicKey = ${RU_WG_PUBLIC_KEY}
          AllowedIPs = 10.20.0.0/30
          Endpoint = ${RU_SERVER_IP}:51821
          PersistentKeepalive = 25
          EOF
          echo "WireGuard config generated"

          echo "=== Валидация конфига ==="
          if grep -q '<.*>' /tmp/wg0.conf; then
            echo "ERROR: Конфиг содержит незаполненные плейсхолдеры"
            cat /tmp/wg0.conf | sed 's/=.*/=***/' || true
            exit 1
          fi
          echo "Конфиг валиден"

      - name: Backup current config
        if: github.event.inputs.deploy_config == 'true'
        env:
          FH: ${{ secrets.FOREIGN_SERVER_HOST }}
          FU: ${{ secrets.FOREIGN_SERVER_USER }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 ${FU}@${FH}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          $SSH "mkdir -p /etc/wireguard/backups"
          $SSH "cp /etc/wireguard/wg0.conf /etc/wireguard/backups/wg0_${TIMESTAMP}.conf.bak 2>/dev/null || true"
          $SSH "ls -1t /etc/wireguard/backups/wg0_*.conf.bak 2>/dev/null | tail -n +6 | xargs -r rm -f"
          echo "Бэкап создан: wg0_${TIMESTAMP}.conf.bak"

      - name: Deploy WireGuard config
        if: github.event.inputs.deploy_config == 'true'
        env:
          FH: ${{ secrets.FOREIGN_SERVER_HOST }}
          FU: ${{ secrets.FOREIGN_SERVER_USER }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 ${FU}@${FH}"

          scp -i ~/.ssh/deploy_key /tmp/wg0.conf ${FU}@${FH}:/etc/wireguard/wg0.conf
          $SSH "chmod 600 /etc/wireguard/wg0.conf"
          echo "Конфиг загружен"

      - name: Restart WireGuard (blue-green)
        if: github.event.inputs.restart_wireguard == 'true'
        env:
          FH: ${{ secrets.FOREIGN_SERVER_HOST }}
          FU: ${{ secrets.FOREIGN_SERVER_USER }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 ${FU}@${FH}"

          echo "=== Остановка WireGuard ==="
          $SSH "wg-quick down wg0 2>/dev/null || true"

          echo "=== Запуск WireGuard ==="
          if $SSH "wg-quick up wg0"; then
            echo "WireGuard запущен успешно"
          else
            echo "ERROR: Не удалось запустить WireGuard. Откат..."
            LATEST_BACKUP=$($SSH "ls -1t /etc/wireguard/backups/wg0_*.conf.bak 2>/dev/null | head -1" || true)
            if [[ -n "${LATEST_BACKUP}" ]]; then
              echo "Восстанавливаю: ${LATEST_BACKUP}"
              $SSH "cp ${LATEST_BACKUP} /etc/wireguard/wg0.conf"
              $SSH "wg-quick up wg0" || true
              echo "Откат выполнен"
            fi
            exit 1
          fi

          echo "=== Статус WireGuard ==="
          $SSH "wg show wg0"

      - name: Verify tunnel connectivity
        if: github.event.inputs.verify_tunnel == 'true'
        timeout-minutes: 3
        env:
          FH: ${{ secrets.FOREIGN_SERVER_HOST }}
          FU: ${{ secrets.FOREIGN_SERVER_USER }}
          RU_TUNNEL_IP: ${{ secrets.RU_TUNNEL_IP }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 ${FU}@${FH}"
          TARGET_IP="${RU_TUNNEL_IP:-10.20.0.1}"

          echo "=== Ожидание установления тоннеля ==="
          sleep 3

          echo "=== Проверка тоннеля: ping ${TARGET_IP} ==="
          TUNNEL_OK=false
          for i in 1 2 3 4 5; do
            if $SSH "ping -c 1 -W 2 ${TARGET_IP}" 2>/dev/null; then
              TUNNEL_OK=true
              echo "Тоннель работает (попытка ${i})"
              break
            else
              echo "Попытка ${i}/5 — нет ответа"
              sleep 2
            fi
          done

          if [[ "${TUNNEL_OK}" != "true" ]]; then
            echo "WARNING: Пинг до РФ-сервера через тоннель не прошёл"
            echo "Проверьте конфигурацию на обоих серверах"
            echo ""
            echo "WireGuard статус:"
            $SSH "wg show wg0" || true
          fi

          echo "=== Трансфер статистика ==="
          $SSH "wg show wg0 transfer" || true

          echo "=== Последние handshake ==="
          $SSH "wg show wg0 latest-handshakes" || true

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key /tmp/wg0.conf

  notify:
    name: Deploy Summary
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Result
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "::notice::FOREIGN DEPLOY SUCCESS"
          else
            echo "::error::FOREIGN DEPLOY FAILED — check logs"
          fi
