name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, dev1]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build -o /dev/null ./cmd/api

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -- --passWithNoTests

      - name: Build
        run: npm run build

  landing:
    name: Landing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate dev compose
        run: docker compose config -q

      - name: Validate prod compose
        run: docker compose -f deploy/server-ru/docker-compose.prod.yml config -q
        env:
          DOMAIN: ci-test.example.com

      - name: Build backend image
        run: docker build -t smarttraffic-api:test ./backend

      - name: Build frontend image
        run: docker build -t smarttraffic-frontend:test ./frontend

      - name: Build landing image
        run: docker build -t smarttraffic-landing:test ./landing

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          ! git grep -iE '(password|secret|api_key|private_key)\s*=\s*["\x27][^"\x27]{8,}' \
            -- ':!*.example' ':!*.template' ':!.env.example' ':!.gitignore' \
            ':(exclude).github/workflows/*' || \
          (echo "SECURITY: Possible hardcoded secrets found!" && exit 1)

      - name: Check .env is not tracked
        run: |
          ! git ls-files --error-unmatch .env 2>/dev/null || \
          (echo "SECURITY: .env file is tracked by git!" && exit 1)

      - name: Check .gitignore covers sensitive files
        run: |
          grep -q '\.env' .gitignore
          grep -q '\.key' .gitignore
          grep -q '\.pem' .gitignore
          echo ".gitignore security patterns OK"
