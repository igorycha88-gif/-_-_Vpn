services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smarttraffic-api
    environment:
      - APP_PORT=8080
      - DB_PATH=/data/smarttraffic.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL:-15m}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL:-168h}
      - WG_INTERFACE=${WG_INTERFACE:-wg0}
      - SINGBOX_CONFIG_PATH=/etc/singbox/config.json
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - FOREIGN_SERVER_IP=${FOREIGN_SERVER_IP:-}
      - FOREIGN_TUNNEL_PRIVATE_KEY=${FOREIGN_TUNNEL_PRIVATE_KEY:-}
      - FOREIGN_TUNNEL_PEER_PUBLIC_KEY=${FOREIGN_TUNNEL_PEER_PUBLIC_KEY:-}
      - FOREIGN_TUNNEL_LOCAL_ADDRESS=${FOREIGN_TUNNEL_LOCAL_ADDRESS:-10.20.0.2/30}
      - WG_MTU=${WG_MTU:-1280}
      - WG_PORT=${WG_PORT:-51820}
      - WG_SERVER_ENDPOINT=${WG_SERVER_ENDPOINT:-}
      - WG_SERVER_PUBLIC_KEY=${WG_SERVER_PUBLIC_KEY:-}
      - WG_CLIENT_SUBNET=${WG_CLIENT_SUBNET:-10.10.0.0/24}
      - WG_DNS=${WG_DNS:-10.10.0.1}
    volumes:
      - api-data:/data
      - ./deploy/server-ru/singbox:/etc/singbox
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smarttraffic-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    restart: unless-stopped

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: smarttraffic-landing
    ports:
      - "8081:80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: smarttraffic-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/server-ru/nginx/conf.d/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
      - landing
    restart: unless-stopped

  singbox:
    image: ghcr.io/sagernet/sing-box
    container_name: smarttraffic-singbox
    volumes:
      - ./deploy/server-ru/singbox:/etc/singbox
    ports:
      - "12345:12345"
      - "5353:5353/udp"
      - "5353:5353/tcp"
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    profiles:
      - routing

volumes:
  certbot-data:
  api-data:
