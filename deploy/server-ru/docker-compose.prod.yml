services:
  nginx:
    image: nginx:alpine
    container_name: smarttraffic-nginx
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "api:host-gateway"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - certbot-data:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
      landing:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot
    container_name: smarttraffic-certbot
    volumes:
      - certbot-data:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: smarttraffic-api
    environment:
      - APP_PORT=8080
      - DB_PATH=/data/smarttraffic.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL:-15m}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL:-168h}
      - VLESS_PRIVATE_KEY=${VLESS_PRIVATE_KEY:-}
      - VLESS_PUBLIC_KEY=${VLESS_PUBLIC_KEY:-}
      - VLESS_SHORT_ID=${VLESS_SHORT_ID:-}
      - VLESS_SERVER_NAME=${VLESS_SERVER_NAME:-www.microsoft.com}
      - VLESS_PORT=${VLESS_PORT:-443}
      - VLESS_FLOW=${VLESS_FLOW:-xtls-rprx-vision}
      - VLESS_FINGERPRINT=${VLESS_FINGERPRINT:-chrome}
      - VLESS_SERVER_ENDPOINT=${VLESS_SERVER_ENDPOINT:-}
      - WG_INTERFACE=${WG_INTERFACE:-wg0}
      - WG_PORT=${WG_PORT:-51820}
      - WG_MTU=${WG_MTU:-1280}
      - WG_TUNNEL_INTERFACE=${WG_TUNNEL_INTERFACE:-wg1}
      - SINGBOX_CONFIG_PATH=/etc/singbox/config.json
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://${DOMAIN}}
      - FOREIGN_SERVER_IP=${FOREIGN_SERVER_IP:-}
      - FOREIGN_TUNNEL_PRIVATE_KEY=${FOREIGN_TUNNEL_PRIVATE_KEY:-}
      - FOREIGN_TUNNEL_PEER_PUBLIC_KEY=${FOREIGN_TUNNEL_PEER_PUBLIC_KEY:-}
      - FOREIGN_TUNNEL_LOCAL_ADDRESS=${FOREIGN_TUNNEL_LOCAL_ADDRESS:-10.20.0.2/30}
    volumes:
      - api-data:/data
      - ./singbox:/etc/singbox
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  singbox:
    image: ghcr.io/sagernet/sing-box
    container_name: smarttraffic-singbox
    working_dir: /etc/singbox
    entrypoint: ["/bin/sh", "-c", "if [ ! -f geoip.db ] || [ ! -s geoip.db ]; then echo 'WARNING: geoip.db missing, downloading...'; wget -q -O geoip.db https://github.com/SagerNet/sing-geoip/releases/latest/download/geoip.db || echo 'FAIL: geoip.db download failed - geoip routing will not work'; fi; if [ ! -f geosite.db ] || [ ! -s geosite.db ]; then echo 'WARNING: geosite.db missing, downloading...'; wget -q -O geosite.db https://github.com/SagerNet/sing-geosite/releases/latest/download/geosite.db || echo 'FAIL: geosite.db download failed'; fi; exec sing-box run -c /etc/singbox/config.json"]
    volumes:
      - ./singbox:/etc/singbox
    network_mode: host
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: smarttraffic-frontend
    environment:
      - VITE_API_URL=https://${DOMAIN}
    restart: unless-stopped

  landing:
    build:
      context: ../../landing
      dockerfile: Dockerfile
    container_name: smarttraffic-landing
    restart: unless-stopped

volumes:
  certbot-data:
  api-data:
